name: Build Library

on:
  push:
    paths:
      - 'Library/**'
      - 'Tools/ProjectCloner/**'
      - 'Examples/ClonerSource/**'

permissions:
  contents: write

jobs:
  build:
    # Off by default. Set the repository variable BUILD_LIBRARY_ENABLED to 'true' to enable.
    if: vars.BUILD_LIBRARY_ENABLED == 'true' && (github.ref_name == 'main' || github.ref_name == vars.BUILD_LIBRARY_TEST_BRANCH)
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Read version
      id: version
      shell: bash
      run: |
        VERSION=$(cat Library/VERSION.txt | tr -d '[:space:]')
        FULL_VERSION="${VERSION}.${{ github.run_number }}"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "full_version=$FULL_VERSION" >> "$GITHUB_OUTPUT"
        echo "Building Dsqt v${FULL_VERSION}"

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Setup Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.10.*'
        arch: win64_msvc2022_64
        modules: 'qtshadertools'

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      env:
        VCPKG_BINARY_SOURCES: default,rw
      with:
        vcpkgDirectory: '${{ github.workspace }}/vcpkg'
        vcpkgGitCommitId: 'b87383e8bc37cc68c758b34f7997a37012fa1fb8'
      

    - name: Set up binary cache
      uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      with:
        path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
        key: ${{ runner.os }}-vcpkg-binary-cache-${{ hashFiles('vcpkg*.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-binary-cache-

    - name: Configure
      shell: cmd
      run: >
        cmake -S Library -B Library/build/ci
        -G "Visual Studio 17 2022" -A x64
        -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
        -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install"

    - name: Build Release
      shell: cmd
      run: cmake --build Library/build/ci --config Release

    - name: Build Debug
      shell: cmd
      run: cmake --build Library/build/ci --config Debug

    - name: Install Release
      shell: cmd
      run: cmake --install Library/build/ci --config Release

    - name: Install Debug
      shell: cmd
      run: cmake --install Library/build/ci --config Debug

    - name: Configure ProjectCloner
      shell: cmd
      run: >
        cmake -S Tools/ProjectCloner -B Tools/ProjectCloner/build/ci
        -G "Visual Studio 17 2022" -A x64
        -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install/Tools/ProjectCloner"

    - name: Build ProjectCloner
      shell: cmd
      run: cmake --build Tools/ProjectCloner/build/ci --config Release

    - name: Install ProjectCloner
      shell: cmd
      run: cmake --install Tools/ProjectCloner/build/ci --config Release

    - name: Copy ClonerSource template
      shell: bash
      run: |
        cp -r "${{ github.workspace }}/Examples/ClonerSource" "${{ github.workspace }}/install/Tools/ClonerSource"

    - name: Package artifacts
      shell: bash
      run: |
        cd "${{ github.workspace }}/install"
        7z a "${{ github.workspace }}/dsqt-${{ steps.version.outputs.full_version }}.zip" .

    - name: Create tag
      if: github.ref_name == 'main' || vars.BRANCH_LIBRARY_RELEASE == 'true'
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag "library/v${{ steps.version.outputs.full_version }}"
        git push origin "library/v${{ steps.version.outputs.full_version }}"

    - name: Create GitHub Release
      if: github.ref_name == 'main' || vars.BRANCH_LIBRARY_RELEASE == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "library/v${{ steps.version.outputs.full_version }}"
        name: "Dsqt Library v${{ steps.version.outputs.full_version }}"
        body: |
          Automated build of Dsqt Library.
          Version: ${{ steps.version.outputs.full_version }}
          Commit: ${{ github.sha }}
        files: dsqt-${{ steps.version.outputs.full_version }}.zip
